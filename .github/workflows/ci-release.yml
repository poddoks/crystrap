name: CI (Release)
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '6.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build -c Release --no-restore

    - name: Publish
      run: dotnet publish -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:IncludeAllContentForSelfExtract=true -p:CommitHash=${{ github.sha }} -p:CommitRef=${{ github.ref_type }}/${{ github.ref_name }} -r win-x64 -c Release --self-contained true .\Bloxstrap\Bloxstrap.csproj

    - name: Create versioned release copy
      shell: pwsh
      run: |
        [xml]$project = Get-Content .\Bloxstrap\Bloxstrap.csproj
        $version = ($project.Project.PropertyGroup.Version | Select-Object -First 1)
        Copy-Item .\Bloxstrap\bin\Release\net6.0-windows\win-x64\publish\Crystrap.exe ".\Bloxstrap\bin\Release\net6.0-windows\win-x64\publish\Crystrap $version.exe" -Force

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        #name: Crystrap (Release) (${{ github.sha }})
        path: |
          .\Bloxstrap\bin\Release\net6.0-windows\win-x64\publish\Crystrap.exe
          .\Bloxstrap\bin\Release\net6.0-windows\win-x64\publish\Crystrap *.exe
        archive: false

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        #with:
        #  name: Crystrap (Release) (${{ github.sha }})
        #  path: release

      #- name: Rename binaries
      #  run: mv release/Crystrap.exe Crystrap.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            Crystrap.exe
            Crystrap *.exe
          name: Crystrap ${{ github.ref_name }}
          fail_on_unmatched_files: true

  release-test:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/release-test')
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        #with:
        #  name: Crystrap (Release) (${{ github.sha }})
        #  path: release

      #- name: Rename binaries
      #  run: mv release/Crystrap.exe Crystrap.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            Crystrap.exe
            Crystrap *.exe
          name: Crystrap ${{ github.ref_name }}
          fail_on_unmatched_files: true
