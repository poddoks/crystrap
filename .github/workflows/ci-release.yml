name: CI (Release)
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '6.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build -c Release --no-restore

    - name: Publish
      run: dotnet publish -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:IncludeAllContentForSelfExtract=true -p:CommitHash=${{ github.sha }} -p:CommitRef=${{ github.ref_type }}/${{ github.ref_name }} -r win-x64 -c Release --self-contained true .\Bloxstrap\Bloxstrap.csproj

    - name: Sign published executable
      if: ${{ secrets.WINDOWS_CERTIFICATE_PFX != '' && secrets.WINDOWS_CERTIFICATE_PASSWORD != '' }}
      shell: pwsh
      env:
        SIGN_CERT_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX }}
        SIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      run: .\Scripts\sign-release.ps1 -CertificateBase64 $env:SIGN_CERT_BASE64 -CertificatePassword $env:SIGN_CERT_PASSWORD -FilePath ".\Bloxstrap\bin\Release\net6.0-windows\win-x64\publish\Crystrap.exe"

    - name: Verify Authenticode signature
      if: ${{ secrets.WINDOWS_CERTIFICATE_PFX != '' && secrets.WINDOWS_CERTIFICATE_PASSWORD != '' }}
      shell: pwsh
      run: |
        $signature = Get-AuthenticodeSignature ".\Bloxstrap\bin\Release\net6.0-windows\win-x64\publish\Crystrap.exe"
        if ($signature.Status -ne 'Valid') {
          throw "Authenticode verification failed: $($signature.Status)"
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: crystrap-release
        path: .\Bloxstrap\bin\Release\net6.0-windows\win-x64\publish\Crystrap.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && !startsWith(github.ref, 'refs/tags/release-test')
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: crystrap-release
          path: release

      #- name: Rename binaries
      #  run: mv release/Crystrap.exe Crystrap.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: release/Crystrap.exe
          name: Crystrap ${{ github.ref_name }}
          fail_on_unmatched_files: true

  release-test:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/release-test')
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: crystrap-release
          path: release

      #- name: Rename binaries
      #  run: mv release/Crystrap.exe Crystrap.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: release/Crystrap.exe
          name: Crystrap ${{ github.ref_name }}
          fail_on_unmatched_files: true
